# Build and publish the NRCC container image to GitHub Container
# Registry (GHCR) every time build.info changes on main. The same
# workflow can also be triggered manually from the Actions tab.
#
# Tags pushed (for build.info = "0.6.0-20260510-02"):
#   ghcr.io/<owner>/ntnx-console-client:0.6.0-20260510-02   (immutable)
#   ghcr.io/<owner>/ntnx-console-client:0.6.0               (rolling patch)
#   ghcr.io/<owner>/ntnx-console-client:0.6                 (rolling minor)
#   ghcr.io/<owner>/ntnx-console-client:latest              (rolling)
#
# Pin to the exact build tag in production; use `:latest` for dev.

name: publish

on:
  push:
    branches: [main]
    paths:
      - 'build.info'         # only build when the version actually changes
  workflow_dispatch:          # manual run from the Actions tab

# Concurrency guard: cancel an older in-flight publish if a newer
# bump-build commit lands while it's still running. Stops two image
# pushes racing for the same `:latest` tag.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write             # required to push to ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Read the version from build.info into a job output so the
      # docker/metadata-action below can derive every tag from it.
      - name: Read build.info
        id: build_info
        run: |
          version="$(head -n1 build.info | tr -d '[:space:]')"
          if [ -z "$version" ]; then
            echo "::error::build.info is empty"
            exit 1
          fi
          # Split Major.Minor.Patch off the version stamp so the
          # rolling tags (0.6, 0.6.0) stay sane.
          mmp="${version%%-*}"          # 0.6.0-20260510-02 -> 0.6.0
          minor="${mmp%.*}"             # 0.6.0             -> 0.6
          {
            echo "version=$version"
            echo "mmp=$mmp"
            echo "minor=$minor"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$version  mmp=$mmp  minor=$minor"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action handles the OCI labels (source, revision,
      # licence, etc.) and emits the tag list in a format build-push
      # can consume directly.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ntnx-console-client
          tags: |
            type=raw,value=${{ steps.build_info.outputs.version }}
            type=raw,value=${{ steps.build_info.outputs.mmp }}
            type=raw,value=${{ steps.build_info.outputs.minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=NRCC
            org.opencontainers.image.description=Nutanix Remote Console Client
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.build_info.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # User picked amd64-only for now (matches the current
          # x86_64 Kubernetes cluster). Add linux/arm64 here once the
          # release model warrants the longer build time.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          {
            echo "### Published"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Pull with:"
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository_owner }}/ntnx-console-client:${{ steps.build_info.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
